# ============================================================
# Bootstrap — First-time ECR image push (one-time use)
#
# Run this ONCE after Terraform Phase 1 creates ECR repos
# but BEFORE Terraform Phase 2 creates Lambda functions.
#
# This workflow ONLY builds and pushes images — it does NOT
# try to update Lambda functions (they don't exist yet).
#
# After this completes, run `terraform apply` with real image URIs.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   ECR_API_REPO_URI        — e.g. public.ecr.aws/x9x0m0l8/study-space-api
#   ECR_WORKER_REPO_URI
#   ECR_FRONTEND_REPO_URI
# ============================================================

name: Bootstrap — Push Initial Images

on:
  workflow_dispatch: # Manual trigger only

env:
  AWS_REGION: us-east-1

jobs:
  push-images:
    name: Build & Push All Images to ECR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin public.ecr.aws

      - name: Build & push API image
        run: |
          IMAGE="${{ secrets.ECR_API_REPO_URI }}:latest"
          docker build -t "${IMAGE}" ./backend
          docker push "${IMAGE}"
          echo "✅ Pushed: ${IMAGE}"

      - name: Build & push Worker image
        run: |
          IMAGE="${{ secrets.ECR_WORKER_REPO_URI }}:latest"
          docker build -f backend/Dockerfile.worker -t "${IMAGE}" ./backend
          docker push "${IMAGE}"
          echo "✅ Pushed: ${IMAGE}"

      - name: Build & push Frontend image
        run: |
          IMAGE="${{ secrets.ECR_FRONTEND_REPO_URI }}:latest"
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL="/api/v1" \
            -t "${IMAGE}" \
            ./frontend
          docker push "${IMAGE}"
          echo "✅ Pushed: ${IMAGE}"

      - name: Summary
        run: |
          echo "🎉 All images pushed to ECR Public!"
          echo ""
          echo "Next steps:"
          echo "  1. Update terraform/terraform.tfvars with real image URIs"
          echo "  2. Run: cd terraform && terraform apply"
          echo "  3. Seed SSM secrets: ./scripts/seed-ssm-secrets.sh"
