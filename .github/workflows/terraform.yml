# ============================================================
# Terraform IaC Pipeline — Plan on PR, Apply on merge to main
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   TF_VAR_api_image_uri
#   TF_VAR_worker_image_uri
#   TF_VAR_frontend_image_uri
# ============================================================

name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.9.0"

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        env:
          TF_VAR_api_image_uri: ${{ secrets.TF_VAR_api_image_uri }}
          TF_VAR_worker_image_uri: ${{ secrets.TF_VAR_worker_image_uri }}
          TF_VAR_frontend_image_uri: ${{ secrets.TF_VAR_frontend_image_uri }}
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan 📋
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform apply (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          TF_VAR_api_image_uri: ${{ secrets.TF_VAR_api_image_uri }}
          TF_VAR_worker_image_uri: ${{ secrets.TF_VAR_worker_image_uri }}
          TF_VAR_frontend_image_uri: ${{ secrets.TF_VAR_frontend_image_uri }}
        run: terraform apply -auto-approve tfplan
