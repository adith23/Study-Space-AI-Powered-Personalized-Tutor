# ============================================================
# CD Pipeline — Deploy to AWS Lambda on push to main
#
# Builds Docker images, pushes to ECR Private, updates Lambda
# functions, and invalidates CloudFront cache.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID       — IAM user with ECR/Lambda/CF permissions
#   AWS_SECRET_ACCESS_KEY
#   AWS_ACCOUNT_ID          — e.g. 580647748431
#   ECR_API_REPO_URI        — e.g. 580647748431.dkr.ecr.us-east-1.amazonaws.com/study-space-api
#   ECR_WORKER_REPO_URI
#   ECR_FRONTEND_REPO_URI
#   CLOUDFRONT_DISTRIBUTION_ID
# ============================================================

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch: # Manual trigger

concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  # ── Build & Push API Image ─────────────────────────────────
  deploy-api:
    name: Deploy API Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR Private
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API image
        run: |
          IMAGE="${{ secrets.ECR_API_REPO_URI }}:${{ github.sha }}"
          IMAGE_LATEST="${{ secrets.ECR_API_REPO_URI }}:latest"
          docker build -t "${IMAGE}" -t "${IMAGE_LATEST}" ./backend
          docker push "${IMAGE}"
          docker push "${IMAGE_LATEST}"

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name study-space-production-api \
            --image-uri "${{ secrets.ECR_API_REPO_URI }}:${{ github.sha }}" \
            --no-cli-pager

      - name: Wait for update
        run: |
          aws lambda wait function-updated-v2 \
            --function-name study-space-production-api

  # ── Build & Push Worker Image ──────────────────────────────
  deploy-worker:
    name: Deploy Worker Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR Private
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Worker image
        run: |
          IMAGE="${{ secrets.ECR_WORKER_REPO_URI }}:${{ github.sha }}"
          IMAGE_LATEST="${{ secrets.ECR_WORKER_REPO_URI }}:latest"
          docker build -f backend/Dockerfile.worker -t "${IMAGE}" -t "${IMAGE_LATEST}" ./backend
          docker push "${IMAGE}"
          docker push "${IMAGE_LATEST}"

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name study-space-production-worker \
            --image-uri "${{ secrets.ECR_WORKER_REPO_URI }}:${{ github.sha }}" \
            --no-cli-pager

      - name: Wait for update
        run: |
          aws lambda wait function-updated-v2 \
            --function-name study-space-production-worker

  # ── Build & Push Frontend Image ────────────────────────────
  deploy-frontend:
    name: Deploy Frontend Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR Private
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Frontend image
        run: |
          IMAGE="${{ secrets.ECR_FRONTEND_REPO_URI }}:${{ github.sha }}"
          IMAGE_LATEST="${{ secrets.ECR_FRONTEND_REPO_URI }}:latest"
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL="/api/v1" \
            -t "${IMAGE}" -t "${IMAGE_LATEST}" \
            ./frontend
          docker push "${IMAGE}"
          docker push "${IMAGE_LATEST}"

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name study-space-production-frontend \
            --image-uri "${{ secrets.ECR_FRONTEND_REPO_URI }}:${{ github.sha }}" \
            --no-cli-pager

      - name: Wait for update
        run: |
          aws lambda wait function-updated-v2 \
            --function-name study-space-production-frontend

  # ── Post-Deploy ────────────────────────────────────────────
  post-deploy:
    name: Invalidate CloudFront Cache
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-worker, deploy-frontend]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*" \
            --no-cli-pager

      - name: Health check
        run: |
          sleep 15
          curl -sf "https://${{ secrets.CLOUDFRONT_DOMAIN }}/health" || echo "⚠️ Health check failed (cold start expected)"
