# CI Pipeline — Runs on every PR and push to main
# Lint, type-check, test backend & frontend

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend Checks
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libpango1.0-dev ffmpeg

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Black format check
        run: black --check .

      - name: Isort import order check
        run: isort --check-only .

      # - name: Flake8 linting
      #   run: flake8 . --max-line-length=120 --ignore=E501,W503,E203

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libpango1.0-dev ffmpeg

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./test.db
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          ENVIRONMENT: development
          JWT_SECRET_KEY: test-secret-key
          GEMINI_API_KEY: test-key
          PINECONE_API_KEY: test-key
          PINECONE_INDEX_NAME: test-index
          EMBEDDING_MODEL_NAME: all-MiniLM-L6-v2
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing || true

  # Frontend Checks
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (standalone)
        run: npm run build

      - name: Verify standalone output
        run: test -d .next/standalone

  # Docker Build Verification
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t study-space-api:test ./backend

      - name: Build Worker image
        run: docker build -f backend/Dockerfile.worker -t study-space-worker:test ./backend

      - name: Build Frontend image
        run: docker build -t study-space-frontend:test ./frontend

  # Security Audit
  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Python dependency audit
        working-directory: backend
        continue-on-error: true
        run: |
          sudo apt-get update && sudo apt-get install -y libcairo2-dev libpango1.0-dev ffmpeg
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Node dependency audit
        working-directory: frontend
        continue-on-error: true
        run: npm audit --audit-level=high
