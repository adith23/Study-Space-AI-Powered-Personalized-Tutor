# Alembic configuration file.
#
# DATABASE_URL is read from the environment / .env file by alembic/env.py,
# so the sqlalchemy.url value below is intentionally blank.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Blank — populated programmatically in env.py from app.core.config.settings.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
