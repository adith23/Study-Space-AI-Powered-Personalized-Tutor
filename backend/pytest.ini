[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Pure logic unit tests (no DB, no network)
    integration: Tests requiring database and/or HTTP client
    e2e: End-to-end browser tests
    ai_eval: AI quality evaluation (non-deterministic, run separately)
    slow: Tests that take more than 10 seconds
    security: Security-focused test cases
asyncio_mode = auto
