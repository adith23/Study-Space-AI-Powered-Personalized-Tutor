# ============================================================
# Local Development — Docker Compose
#
# Uses the original Celery + Redis flow (no SQS/Lambda).
# The task_dispatcher.py automatically falls back to Celery
# when ENVIRONMENT != "production".
# ============================================================

services:
  redis:
    image: redis:7-alpine
    container_name: study-space-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ./backend
      target: runtime
    container_name: study-space-backend-dev
    env_file:
      - backend/.env
    environment:
      - ENVIRONMENT=development
      - STORAGE_BACKEND=local
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./backend
      target: runtime
    container_name: study-space-celery-dev
    env_file:
      - backend/.env
    environment:
      - ENVIRONMENT=development
      - STORAGE_BACKEND=local
    volumes:
      - ./backend:/app
      - ./backend/storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A app.core.celery_worker.celery_app worker
      --loglevel=info --pool=solo

  frontend:
    build:
      context: ./frontend
      target: deps
    container_name: study-space-frontend-dev
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://backend:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
